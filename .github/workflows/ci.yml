name: UI Automated Tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout code
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Set up JDK
      # =========================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # =========================
      # Grant permission
      # =========================
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # =========================
      # Cache Gradle (optional fallback - can be removed if using setup-java cache)
      # =========================
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # =========================
      # Run tests (HEADLESS SAFE)
      # =========================
      - name: Run tests
        run: ./gradlew clean test -Dheadless=true
